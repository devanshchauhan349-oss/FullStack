<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>E-commerce Catalog</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
  <div class="container py-4">
    <h1 class="mb-4 text-center">🛍️ E-commerce Catalog</h1>

    <!-- Message -->
    <div id="message" class="alert alert-info d-none"></div>

    <!-- Categories -->
    <h2>Categories</h2>
    <ul id="categories" class="list-group mb-4"></ul>

    <!-- Products -->
    <h2>Products</h2>
    <div id="productsGrid" class="row g-4 mb-4"></div>

    <!-- Add Category Form -->
    <h3>Add Category</h3>
    <form class="row g-3 mb-4" onsubmit="addCategory(event)">
      <div class="col-md-4">
        <input type="text" id="catName" class="form-control" placeholder="Category Name" required>
      </div>
      <div class="col-md-6">
        <input type="text" id="catDesc" class="form-control" placeholder="Description">
      </div>
      <div class="col-md-2">
        <button type="submit" class="btn btn-primary w-100">Add</button>
      </div>
    </form>

    <!-- Add Product Form -->
    <h3>Add Product</h3>
    <form class="row g-3" onsubmit="addProduct(event)">
      <div class="col-md-3">
        <input type="text" id="prodName" class="form-control" placeholder="Product Name" required>
      </div>
      <div class="col-md-3">
        <input type="text" id="prodDesc" class="form-control" placeholder="Description">
      </div>
      <div class="col-md-2">
        <input type="number" id="prodPrice" class="form-control" placeholder="Price" required>
      </div>
      <div class="col-md-2">
        <select id="prodCategory" class="form-select"></select>
      </div>
      <div class="col-md-2">
        <button type="submit" class="btn btn-success w-100">Add</button>
      </div>
    </form>
  </div>

  <script>
    function showMessage(msg, type="info") {
      const messageDiv = document.getElementById("message");
      messageDiv.className = `alert alert-${type}`;
      messageDiv.textContent = msg;
      messageDiv.classList.remove("d-none");
    }

    async function loadCategories() {
      const res = await fetch("/categories");
      const categories = await res.json();
      const list = document.getElementById("categories");
      const select = document.getElementById("prodCategory");
      list.innerHTML = "";
      select.innerHTML = "";
      categories.forEach(cat => {
        const li = document.createElement("li");
        li.className = "list-group-item";
        li.textContent = `${cat.name} - ${cat.description}`;
        list.appendChild(li);

        const option = document.createElement("option");
        option.value = cat._id;
        option.textContent = cat.name;
        select.appendChild(option);
      });
    }

    async function loadProducts() {
      const res = await fetch("/products");
      const products = await res.json();
      const grid = document.getElementById("productsGrid");
      grid.innerHTML = "";
      products.forEach(prod => {
        const card = document.createElement("div");
        card.className = "col-md-4";
        card.innerHTML = `
          <div class="card h-100 shadow-sm">
            <div class="card-body">
              <h5 class="card-title">${prod.name}</h5>
              <p class="card-text">${prod.description}</p>
              <p class="text-muted">Category: ${prod.category ? prod.category.name : "Uncategorized"}</p>
              <p class="fw-bold">$${prod.price}</p>
            </div>
          </div>
        `;
        grid.appendChild(card);
      });
    }

    async function addCategory(e) {
      e.preventDefault();
      const name = document.getElementById("catName").value;
      const description = document.getElementById("catDesc").value;
      const res = await fetch("/categories", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ name, description })
      });
      const data = await res.json();
      showMessage(data.name ? "✅ Category added!" : data.message, data.name ? "success" : "danger");
      loadCategories();
    }

    async function addProduct(e) {
      e.preventDefault();
      const name = document.getElementById("prodName").value;
      const description = document.getElementById("prodDesc").value;
      const price = document.getElementById("prodPrice").value;
      const category = document.getElementById("prodCategory").value;
      const res = await fetch("/products", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ name, description, price, category })
      });
      const data = await res.json();
      showMessage(data.name ? "✅ Product added!" : data.message, data.name ? "success" : "danger");
      loadProducts();
    }

    loadCategories();
    loadProducts();
  </script>
</body>
</html>
